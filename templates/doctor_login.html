{% extends "base.html" %}

{%block title%}Doctor Login{%endblock title%}

{%block body%}
<div class="cc-auth-wrapper">
    <div class="cc-auth-card cc-animate-fadeInUp">
        <div class="text-center mb-4">
            <div class="cc-feature-icon mx-auto mb-3">
                <i class="fa-solid fa-user-doctor"></i>
            </div>
            <h2>Doctor Login</h2>
            <p class="text-muted">Welcome back, Doctor! Let's care for your patients.</p>
        </div>
        <form method="post" action="/doctor_login">
            {% csrf_token %}

            <input type="hidden" name="is_doctor" value="1">

            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-user me-1"></i> Username</label>
                <input type="text" name="username" placeholder="Enter your username" class="cc-auth-input">
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-lock me-1"></i> Password</label>
                <input type="password" name="password" placeholder="Enter your password" class="cc-auth-input">
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-phone me-1"></i> Phone Number</label>
                <input type="text" name="phone" placeholder="Enter your phone number" class="cc-auth-input">
            </div>
            <button type="submit" class="btn btn-cc-primary w-100 mt-3">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Login as Doctor
            </button>
        </form>
        <p class="text-center text-muted mt-4 mb-0 small">
            Not registered? <a href="/doctor_register">Register as Doctor</a>
        </p>
    </div>
</div>
{%endblock body%}
